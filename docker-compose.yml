services:
  mysql:
    image: mysql:8.0
    container_name: english-learning-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: english_learning
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      timeout: 20s
      retries: 10

  backend:
    build:
      context: ./BackEnd
      dockerfile: Dockerfile
    container_name: english-learning-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/english_learning?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ""
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./FrontEnd
      dockerfile: Dockerfile
    container_name: english-learning-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
