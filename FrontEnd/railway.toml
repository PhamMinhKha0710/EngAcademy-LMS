[build]
  builder = "DOCKERFILE"
  dockerfilePath = "Dockerfile"

[deploy]
  startCommand = "nginx -g 'daemon off;'"
  healthcheckPath = "/"
  healthcheckInterval = 30
  restartPolicyType = "ON_FAILURE"
  restartPolicyMaxRetries = 3

[env]
  PORT = "3000"

[build.args]
  VITE_API_URL = "https://engacademy-lms.onrender.com"
