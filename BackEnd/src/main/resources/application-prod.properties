# =================== Production Profile ===================
spring.profiles.active=prod

# MySQL Database (Railway)
spring.datasource.url=${DATABASE_URL:${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/english_learning?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}}
spring.datasource.username=${DB_USERNAME:${SPRING_DATASOURCE_USERNAME:root}}
spring.datasource.password=${DB_PASSWORD:${SPRING_DATASOURCE_PASSWORD:}}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO}
server.port=${PORT:${SERVER_PORT:8080}}

# Security (JWT) - from environment
application.security.jwt.secret-key=${APPLICATION_SECURITY_JWT_SECRET_KEY:5A7234753778214125442A472D4B6150645367566B59703373357638792F423F}
application.security.jwt.expiration=${APPLICATION_SECURITY_JWT_EXPIRATION}
application.security.jwt.refresh-token.expiration=${APPLICATION_SECURITY_JWT_REFRESH_TOKEN_EXPIRATION}

# CORS - Production origins
application.cors.allowed-origins=${APPLICATION_CORS_ALLOWED_ORIGINS}

# Mail (SMTP Gmail)
spring.mail.host=${SPRING_MAIL_HOST}
spring.mail.port=${SPRING_MAIL_PORT}
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.default-encoding=UTF-8

# Redis (Upstash)
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT}
spring.data.redis.username=${SPRING_DATA_REDIS_USERNAME}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD}
spring.data.redis.ssl=${SPRING_DATA_REDIS_SSL}
spring.data.redis.lettuce.pool.enabled=${SPRING_DATA_REDIS_LETTUCE_POOL_ENABLED}
spring.data.redis.lettuce.pool.max-active=${SPRING_DATA_REDIS_LETTUCE_POOL_MAX_ACTIVE}
spring.data.redis.lettuce.pool.max-idle=${SPRING_DATA_REDIS_LETTUCE_POOL_MAX_IDLE}
spring.data.redis.lettuce.pool.min-idle=${SPRING_DATA_REDIS_LETTUCE_POOL_MIN_IDLE}

# Rate Limiting
rate-limit.max-attempts=${RATE_LIMIT_MAX_ATTEMPTS}
rate-limit.window-seconds=${RATE_LIMIT_WINDOW_SECONDS}
rate-limit.enabled=${RATE_LIMIT_ENABLED}

# =================== Flyway Migration ===================
spring.flyway.enabled=false
