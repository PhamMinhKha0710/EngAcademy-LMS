# =================== Production Profile ===================
# NOTE: Do NOT set spring.profiles.active here - Spring Boot forbids this
# in profile-specific files. The profile is activated via --spring.profiles.active
# in the Dockerfile ENTRYPOINT or SPRING_PROFILES_ACTIVE env var.

# MySQL Database (Railway) - fallback values hardcoded for Docker container env-var reliability
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://hopper.proxy.rlwy.net:56199/railway?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:yXZzFdHrRyCrLOJzoqxdPqzPSVlQZoBD}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:none}
spring.jpa.defer-datasource-initialization=false
# HikariCP Connection Pool tuning
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-test-query=SELECT 1
server.port=${PORT:10000}

# Security (JWT) - from environment
application.security.jwt.secret-key=${APPLICATION_SECURITY_JWT_SECRET_KEY:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
application.security.jwt.expiration=${APPLICATION_SECURITY_JWT_EXPIRATION:86400000}
application.security.jwt.refresh-token.expiration=${APPLICATION_SECURITY_JWT_REFRESH_TOKEN_EXPIRATION:604800000}

# CORS - Production origins
application.cors.allowed-origins=${APPLICATION_CORS_ALLOWED_ORIGINS:https://eng-academy-lms.vercel.app,https://*.vercel.app,http://localhost:3000,http://localhost:3001}

# Mail (SMTP Gmail)
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.default-encoding=UTF-8

# Redis (Upstash) - URL format parses host, port, username, password, SSL automatically
spring.data.redis.url=${REDIS_URL:}

# Rate Limiting
rate-limit.max-attempts=${RATE_LIMIT_MAX_ATTEMPTS:100}
rate-limit.window-seconds=${RATE_LIMIT_WINDOW_SECONDS:60}
rate-limit.enabled=${RATE_LIMIT_ENABLED:true}

# =================== Flyway Migration ===================
spring.flyway.enabled=false

# =================== SQL Initialization ===================
# Disable data.sql auto-execution in prod to prevent H2 fallback errors.
# H2 (fallback DB when MySQL connection fails) does not support multi-row INSERT syntax.
spring.sql.init.mode=never
