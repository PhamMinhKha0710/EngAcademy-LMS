# =================== Development Profile ===================
# Cấu hình cho môi trường local development

# MySQL Database (Railway)
spring.datasource.url=jdbc:mysql://mainline.proxy.rlwy.net:53123/railway?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&useUnicode=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=bmqHwzikMTxdMSEsRaraCWOkJolHMWAD
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate - update schema for fresh dev DB
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.defer-datasource-initialization=true

# HikariCP Connection Pool
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Server port
server.port=8080

# Security (JWT) - dev keys (same as default)
application.security.jwt.secret-key=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
application.security.jwt.expiration=86400000
application.security.jwt.refresh-token.expiration=604800000

# CORS - Development origins
application.cors.allowed-origins=http://localhost:3000,http://localhost:3001,http://localhost:5173

# Mail (SMTP) - disabled in dev by default
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.default-encoding=UTF-8

# Redis - localhost (optional, disable nếu không chạy Redis local)
# Uncomment nếu bạn có Redis chạy local
# spring.data.redis.host=localhost
# spring.data.redis.port=6379
# spring.data.redis.password=
spring.data.redis.enabled=false

# Rate Limiting
rate-limit.max-attempts=100
rate-limit.window-seconds=60
rate-limit.enabled=true

# Flyway Migration - enable for dev
spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# SQL Initialization
spring.sql.init.mode=never

# DevTools - disable restart to avoid ClassNotFoundException
spring.devtools.restart.enabled=false

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
