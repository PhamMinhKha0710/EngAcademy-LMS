## Sample Spring Boot configuration for EnglishLearn
## Copy this file to application.properties or application-dev.properties
## and fill in real values locally. DO NOT COMMIT real secrets.

# Server Configuration
spring.profiles.active=dev
server.port=8080
server.servlet.context-path=/

# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/english_learning?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
