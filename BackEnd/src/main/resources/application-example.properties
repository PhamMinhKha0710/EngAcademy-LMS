# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Security (JWT) – use a secure random 256-bit key
application.security.jwt.secret-key=CHANGE_ME_TO_A_SECURE_RANDOM_KEY
application.security.jwt.expiration=86400000
application.security.jwt.refresh-token.expiration=604800000

# CORS
application.cors.allowed-origins=http://localhost:3000,http://localhost:3001

# Mail (SMTP) – fill with your own SMTP account
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=YOUR_SMTP_USERNAME
spring.mail.password=YOUR_SMTP_PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.default-encoding=UTF-8

